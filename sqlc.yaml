version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/repository/migrations"
    queries: "internal/db/query"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "timestamptz"
            go_type: "time.Time"
